
Build:
- Version:
    Path: Carbon.Windows.Service\Carbon.Windows.Service.psd1
    Prerelease:
    - main: ""
    - "*": rc1
    IncrementPrereleaseVersion: true

# Update the AppVeyor build/version number.
- Exec: appveyor UpdateBuild -Version "$(WHISKEY_SEMVER2)+$(WHISKEY_BUILD_NUMBER)"
  .OnlyBy: BuildServer

- PowerShell: |
    prism install -Path .\Carbon.Windows.Service | Format-Table

    New-Item -Path '.\Carbon.Windows.Service\bin' -ItemType 'Directory' -ErrorAction Ignore | Format-Table

    # powershell.exe and pwsh.exe handle arguments passed to sc.exe differently. This tool helps us detect how args are
    # passed.
    $typeDef = @'
        using System;

        public static class Args
        {
            public static void Main(string[] args)
            {
                foreach (var arg in args)
                {
                    Console.WriteLine(arg);
                }
            }
        }
    '@
    Add-Type -TypeDefinition $typeDef -OutputType ConsoleApplication -OutputAssembly .\Carbon.Windows.Service\bin\args.exe

# Dot-sourcing files is expensive. Move all functions into .psm1 file to improve import speed. Do this before testing
# to ensure the module still works.
- MergeFile:
    .OnlyBy: BuildServer
    # Builds run twice on some serves. Only run this step if the module hasn't been merged yet.
    .IfExists: Carbon.Windows.Service\Functions\*.ps1
    Path:
    - Carbon.Windows.Service\Functions\*.ps1
    DestinationPath: Carbon.Windows.Service\Carbon.Windows.Service.psm1
    DeleteSourceFiles: true
    TextSeparator: "$(NewLine)$(NewLine)"

- PowerShell: .\init.ps1
  .ExceptDuring: Clean

- PowerShell: .\reset.ps1
  .OnlyDuring: Clean

- CopyFile:
    Path:
    - CHANGELOG.md
    - README.md
    - LICENSE.txt
    - NOTICE.txt
    DestinationDirectory: Carbon.Windows.Service

- Zip:
    ArchivePath: $(WHISKEY_OUTPUT_DIRECTORY)\Carbon.Windows.Service-$(WHISKEY_SEMVER2).zip
    Path:
    - Carbon.Windows.Service
    Exclude:
    - "*.pdb"
    - "*.orig"

- Exec: appveyor PushArtifact '$(WHISKEY_OUTPUT_DIRECTORY)\Carbon.Windows.Service-$(WHISKEY_SEMVER2).zip' '-DeploymentName' 'GitHub'
  .OnlyBy: BuildServer

- PublishPowerShellModule:
    Path: Carbon.Windows.Service

- Exec: appveyor PushArtifact '$(WHISKEY_OUTPUT_DIRECTORY)\Carbon.Windows.Service.$(WHISKEY_SEMVER2_NO_BUILD_METADATA).nupkg' -DeploymentName 'PowerShellGallery'
  .OnlyBy: BuildServer

Test:
- PowerShell: prism install | Format-Table
- Pester:
    Configuration:
        Run:
            Path: Tests\*.Tests.ps1
            Exit: true
        TestResult:
            Enabled: true
            OutputPath: .output\pester.xml
            TestSuiteName: Carbon.Windows.Service
        Output:
            Verbosity: Detailed
